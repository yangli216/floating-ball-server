server:
  port: 8080

spring:
  application:
    name: floating-ball-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${FB_DB_URL:jdbc:oracle:thin:@10.17.66.45:1521:phis}
    username: ${FB_DB_USERNAME:RBMH_AI}
    password: ${FB_DB_PASSWORD:RBMH_AI}
    hikari:
      initialization-fail-timeout: 1
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${FB_RELEASE_MAX_FILE_SIZE:2048MB}
      max-request-size: ${FB_RELEASE_MAX_REQUEST_SIZE:2048MB}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'
  global-config:
    db-config:
      logic-delete-field: fgActive
      logic-delete-value: 0
      logic-not-delete-value: 1

floating-ball:
  aes-key: ${FB_AES_KEY:FloatingBallKey!}
  admin:
    bootstrap-reset:
      enabled: ${FB_ADMIN_BOOTSTRAP_RESET_ENABLED:false}
      username: ${FB_ADMIN_BOOTSTRAP_RESET_USERNAME:admin}
      password: ${FB_ADMIN_BOOTSTRAP_RESET_PASSWORD:}
  audit:
    speech-file-dir: ${FB_AUDIT_SPEECH_FILE_DIR:${java.io.tmpdir}/floating-ball-server/speech-audit}
  release:
    storage-dir: ${FB_RELEASE_STORAGE_DIR:${java.io.tmpdir}/floating-ball-server/releases}
    public-base-url: ${FB_RELEASE_PUBLIC_BASE_URL:}
  cors:
    allowed-origins:
      - ${FB_ADMIN_ORIGIN_LOCALHOST:http://localhost:5174}
      - ${FB_ADMIN_ORIGIN_LOOPBACK:http://127.0.0.1:5174}
      - ${FB_ADMIN_PREVIEW_ORIGIN_LOCALHOST:http://localhost:4173}
      - ${FB_ADMIN_PREVIEW_ORIGIN_LOOPBACK:http://127.0.0.1:4173}
  ai:
    connect-timeout-ms: ${FB_AI_CONNECT_TIMEOUT_MS:30000}
    read-timeout-ms: ${FB_AI_READ_TIMEOUT_MS:120000}
    stream:
      core-pool-size: ${FB_AI_STREAM_CORE_POOL_SIZE:4}
      max-pool-size: ${FB_AI_STREAM_MAX_POOL_SIZE:16}
      queue-capacity: ${FB_AI_STREAM_QUEUE_CAPACITY:32}
      keep-alive-seconds: ${FB_AI_STREAM_KEEP_ALIVE_SECONDS:60}
    proxy:
      enabled: ${FB_AI_PROXY_ENABLED:false}
      host: ${FB_AI_PROXY_HOST:}
      port: ${FB_AI_PROXY_PORT:7890}
      username: ${FB_AI_PROXY_USERNAME:}
      password: ${FB_AI_PROXY_PASSWORD:}
  outbound-security:
    allowed-hosts: ${FB_OUTBOUND_ALLOWED_HOSTS:}
    allow-all-hosts: ${FB_OUTBOUND_ALLOW_ALL_HOSTS:true}
    allow-private-network: ${FB_OUTBOUND_ALLOW_PRIVATE_NETWORK:true}
    allow-insecure-http: ${FB_OUTBOUND_ALLOW_INSECURE_HTTP:true}
    allow-proxy-fake-ip: ${FB_OUTBOUND_ALLOW_PROXY_FAKE_IP:true}
    rate-limit-per-minute: ${FB_OUTBOUND_RATE_LIMIT_PER_MINUTE:120}
    circuit-failure-threshold: ${FB_OUTBOUND_CIRCUIT_FAILURE_THRESHOLD:5}
    circuit-open-ms: ${FB_OUTBOUND_CIRCUIT_OPEN_MS:30000}
