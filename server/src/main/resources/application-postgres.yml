spring:
  datasource:
    driver-class-name: ${FB_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
    url: ${FB_DB_URL:jdbc:postgresql://127.0.0.1:5432/floating_ball}
    username: ${FB_DB_USERNAME:floating_ball}
    password: ${FB_DB_PASSWORD:floating_ball}

floating-ball:
  database:
    type: postgres
