server:
  port: 8080

logging:
  level:
    root: WARN
    com.regionalai.floatingball.server: INFO
  file:
    path: ${FB_LOG_PATH:${java.io.tmpdir}/floating-ball-server/logs}

spring:
  datasource:
    url: ${FB_DB_URL:jdbc:oracle:thin:@10.17.66.45:1521:phis}
    username: ${FB_DB_USERNAME:RBMH_AI}
    password: ${FB_DB_PASSWORD:RBMH_AI}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

floating-ball:
  admin:
    bootstrap-reset:
      enabled: false
  cors:
    allowed-origins:
      - ${FB_ADMIN_ORIGIN}
  ai:
    connect-timeout-ms: ${FB_AI_CONNECT_TIMEOUT_MS:30000}
    read-timeout-ms: ${FB_AI_READ_TIMEOUT_MS:120000}
    proxy:
      enabled: ${FB_AI_PROXY_ENABLED:false}
      host: ${FB_AI_PROXY_HOST:}
      port: ${FB_AI_PROXY_PORT:7890}
